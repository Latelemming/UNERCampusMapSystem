<!DOCTYPE html>
<html lang="en">
<head>
    <!--imports-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     <link rel="icon" type="image/png" href="Logo.png" />
      
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <!--Ends here-->
    <link  rel="stylesheet" href="map-style.css">
    

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Map</title>
</head>
<body>
    <div class="map-container">
        <div class="map-topbar">
            <div class="logo"><strong>CAMPUS MAP</strong></div>
            <div class="search-group">
                <div class="search-card">
                    <span class="search-icon">🔍</span>
                    <input id="search-input" type="text" placeholder="Search places or addresses">
                </div>
                <div id="search-suggestions" class="search-suggestions" aria-label="Search suggestions"></div>
                <div class="quick-icons">
                    <button class="quick-btn">Administration</button>
                    <button class="quick-btn">AppLab</button>
                    <button class="quick-btn">Library</button>
                    <button class="quick-btn">LT Block</button>
                    <button class="quick-btn">LTS Block</button>
                </div>
            </div>
        </div>
        <div class="map-control-panel">
            <button id="btn-location" class="control-btn">My location</button>
            <button id="btn-directions" class="control-btn">Directions</button>
        </div>
        <div id="map"></div>

        <div class="locations-panel" id="locations-panel">
            <div class="locations-panel-header">
                <div>
                    <h3>All locations</h3>
                    <span>Tap to view</span>
                </div>
                <button id="locations-panel-toggle" class="panel-toggle-btn" type="button" aria-expanded="true">−</button>
            </div>
            <div id="locations-list" class="locations-list"></div>
        </div>

        
    </div>
</body>
<script src="map-script.js"></script>
</html>
